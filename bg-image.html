<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>background-image</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <style>
    .hero {
      background-image: url(images/office.jpg);
      height: 998px;
      background-position: center;
      background-size: cover;
    }
    .overlay {
      background-color: rgba(0, 0, 0, 0.6);
      height: 100%;
    }
  </style>
  <body>
    <div class="hero">
      <div class="overlay">
        <h2 class="display-3 fw-semibold text-center text-light">
          Welcome To Rentals
        </h2>
        <p class="text-center fw-semibold fs-3 m-5 text-light">
          Lorem ipsum, dolor sit amet consectetur adipisicing elit. Nulla nemo
          ab corporis, ipsam officiis, voluptate aperiam nostrum accusantium
          fugiat aliquid nam dignissimos. Tempore porro aliquam ducimus,
          necessitatibus accusamus maxime explicabo?
        </p>
        <a href="" class="btn btn-primary mt-3">Click here for more info</a>
      </div>
    </div>
  </body>
</html>
