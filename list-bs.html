<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>three types of CSS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h1
      class="text-center text-success-emphasis my-4 bg-warning-subtle border border-5 border-dark m-4 p-3 rounded-4"
    >
      My Daily Routine
    </h1>
    <div>
      <h2
        class="border border-3 border-danger bg-secondary m-3 p-3 text-center rounded-pill"
      >
        Morning Tasks
      </h2>
      <ul class="list-group m-3">
        <li class="list-group-item active">Wake Up</li>
        <li class="list-group-item bg-danger-subtle">Brush Teeth</li>
        <li class="list-group-item bg-info-subtle">Jog for 30 mins</li>
        <li class="list-group-item bg-success-subtle">Workout for 20 mins</li>
        <li class="list-group-item bg-dark-subtle">Take Bath</li>
        <li class="list-group-item bg-warning-subtle">Have Breakfast</li>
        <li class="list-group-item bg-primary-subtle fw-semibold">
          Go to College
        </li>
      </ul>
      <h3
        class="m-3 p-2 border border-secondary bg-danger rounded-3 text-center"
      >
        After noon Tasks
      </h3>
      <ul class="list-group m-4">
        <li class="list-group-item active">Come Back Home</li>
        <li class="list-group-item">Have Lunch</li>
        <li class="list-group-item">Take a nap</li>
      </ul>
    </div>
  </body>
</html>
