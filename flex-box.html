<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <style>
    .container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      flex-direction: row;
      min-height: 250px;
      padding: 10px;
      justify-content: space-evenly;
      align-items: flex-end;
    }
    .box {
      width: 300px;
      height: 250px;
      text-align: center;
      font-size: 25px;
      font-weight: bold;
      padding: 20px;
      padding-top: 25px;
      border-radius: 30px;
    }
  </style>
  <body>
    <h3 class="text-center fw-semibold fst-italic display-1">
      <span class="text-danger">F</span>l<span class="text-warning">e</span>x
      Bo<span class="text-success">x</span>
    </h3>
    <div class="container border border-5 border-dark">
      <div class="box bg-primary border border-2 border-dark text-light">1</div>
      <div class="box bg-info border border-2 border-dark">2</div>
      <div class="box bg-danger border border-2 border-dark">3</div>
      <div class="box bg-success border border-2 border-dark text-white">4</div>
      <div
        class="box bg-warning border border-2 border-dark text-danger-emphasis"
      >
        5
      </div>
      <div class="box bg-info-subtle border border-2 border-dark text-danger">
        6
      </div>
      <div class="box bg-secondary border border-2 border-dark text-light">
        7
      </div>
      <div class="box bg-dark border border-2 border-dark text-warning">8</div>
      <div class="box bg-success border border-2 border-dark">9</div>
      <div class="box bg-warning border border-2 border-dark">10</div>
    </div>
  </body>
</html>
